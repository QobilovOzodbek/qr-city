<!DOCTYPE html>
<html lang="uz">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ark Fortress - Bukhara</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <!-- HEADER -->

    <header class="bg-black text-white">

        <div class="max-w-6xl mx-auto p-4 flex justify-between items-center">

            <h1 class="text-xl font-bold">Ark Fortress</h1>

            <select id="lang" class="text-black p-1 rounded">

                <option value="uz">Uzbek</option>
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="tr">Türkçe</option>

            </select>

        </div>

    </header>


    <!-- HERO IMAGE -->

    <section class="w-full h-72 md:h-[420px]">

        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/Ark_of_Bukhara_2023.9.jpg/500px-Ark_of_Bukhara_2023.9.jpg"
            class="w-full h-full object-cover">

    </section>


    <!-- CONTENT -->

    <section class="max-w-4xl mx-auto p-5">

        <!-- VIDEO -->

        <iframe class="w-full h-64 md:h-96 rounded-xl shadow" src="https://www.youtube.com/embed/t5O2N" allowfullscreen>
        </iframe>


        <!-- TEXT -->

        <div class="bg-white p-6 rounded-xl shadow mt-6">

            <h2 id="title" class="text-2xl font-bold mb-4"></h2>

            <p id="text" class="leading-relaxed text-gray-700"></p>

        </div>


        <!-- MAP -->

        <div class="mt-8">

            <h3 class="text-xl font-semibold mb-3">Location</h3>

            <iframe class="w-full h-80 rounded-xl" src="https://maps.google.com/maps?q=ark%20bukhara&output=embed">
            </iframe>

        </div>

    </section>


    <script>

        const data = {

            uz: {
                title: "Ark qal’asi",
                text: `Ark qal’asi Buxoro shahrining eng qadimiy yodgorliklaridan biri hisoblanadi. 
U taxminan 5-asrda qurilgan bo‘lib, Buxoro amirlarining qarorgohi bo‘lgan.

Ark qal’asi baland tepalik ustida joylashgan bo‘lib, ichida saroylar, masjidlar,
ma’muriy binolar va omborlar mavjud bo‘lgan.

Tarix davomida qal’a ko‘plab urushlar va bosqinlarni boshdan kechirgan.
1920-yilda qal’a katta zarar ko‘rgan, ammo bugungi kunda u muhim
tarixiy va turistik maskan hisoblanadi.`
            },

            en: {
                title: "Ark Fortress",
                text: `Ark Fortress is one of the oldest architectural monuments in Bukhara.
It is believed to have been built around the 5th century.

The fortress served as the residence of the Emirs of Bukhara.
Inside the complex there were palaces, mosques, administrative buildings
and storage areas.

Throughout history the fortress witnessed many historical events and wars.
Today Ark Fortress is one of the main tourist attractions of Bukhara.`
            },

            ru: {
                title: "Крепость Арк",
                text: `Крепость Арк — один из древнейших архитектурных памятников Бухары.
Она служила резиденцией бухарских эмиров.

Внутри крепости находились дворцы, мечети и административные здания.
Сегодня это одна из главных достопримечательностей города.`
            },

            tr: {
                title: "Ark Kalesi",
                text: `Ark Kalesi Buhara'nın en eski tarihi yapılarından biridir.
Yüzyıllar boyunca Buhara emirlerinin sarayı olarak kullanılmıştır.

Kalenin içinde saraylar, camiler ve yönetim binaları bulunuyordu.`
            }

        }


        function updateLang(lang) {

            document.getElementById("title").innerText = data[lang].title
            document.getElementById("text").innerText = data[lang].text

        }

        document.getElementById("lang").addEventListener("change", (e) => {

            updateLang(e.target.value)

        })

        updateLang("uz")

    </script>

</body>

</html>
